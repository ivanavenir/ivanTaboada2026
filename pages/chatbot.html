<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHATBOT</title>
    <link rel="stylesheet" href="../css/chatStyle.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" href="../assets/icons/logo.png" type="image/png" sizes="24x24">
    <link rel="apple-touch-icon" href="../assets/icons/logo.png" sizes="180x180">

    <style>
        .typewriter {
            font-family: 'Courier New', monospace;
            display: block;
            position: relative;
            overflow: hidden;
            white-space: pre-wrap;
        }
        h2.typewriter {
            min-height: 2.2rem; 
        }
    </style>
</head>

<body>
    <header></header>

    <div class="chat-container">
        <h2 class="typewriter" data-text="Ask me anything!">Ask me anything!</h2>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe un mensaje..." />
            <button id="send-btn" class="btn secondary">Send</button>
        </div>
    </div>
    <script>
        console.log("chatbot.html cargado correctamente");

        const input = document.querySelector("#user-input");
        const sendBtn = document.querySelector("#send-btn");
        const chatBox = document.querySelector("#chat-box");

        sendBtn.addEventListener("click", sendMessage);
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage("user", message);
            input.value = "";

            try {
                console.log("Enviando mensaje al backend:", message);

                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message }),
                });

                if (!res.ok) throw new Error(`Error HTTP ${res.status}`);

                const data = await res.json();
                console.log("Respuesta del servidor:", JSON.stringify(data));

                addMessage("bot", data.text || data.error || "No tengo respuesta");
            } catch (err) {
                console.error("Error al enviar mensaje:", err);
                addMessage("bot", "Ocurrió un error al enviar tu mensaje");
            }
        }

        function addMessage(sender, text) {
            const div = document.createElement("div");
            div.className = sender;
            div.textContent = `${sender === "user" ? "USER:" : "IVÁN:"} ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
    <script>
        class TypeWriter {
            constructor(element, speed = 100) {
                this.element = element;
                this.text = element.dataset.text || element.textContent || "";
                this.speed = speed;
                this.index = 0;
                this.element.textContent = "";
                this.type();
            }

            type() {
                if (this.index < this.text.length) {
                    this.element.textContent += this.text[this.index];
                    this.index++;
                    setTimeout(() => this.type(), this.speed);
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll(".typewriter").forEach(el => new TypeWriter(el, 100));
        });
    </script>

    <script src="../js/main.js" defer></script>
</body>

</html>
