<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EZDAW</title>
    <link rel="stylesheet" href="../css/ezdawStyle.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="../assets/icons/logo.png" type="image/png" sizes="24x24">
</head>

<body class="subpage">
    <header></header>
    <main class="wrap hero">
        <div class="hero-left">
            <h2 class="typewriter main-title">EZDAW</h2>
            <p class="typewriter desc">
                Here you can make your own beats in a simple step sequencer. Click the pads to activate them, adjust the
                BPM and tone controls, and hit play to hear your creation come to life!
            </p>

            <div class="daw-container">
                <div class="controls">
                    <button id="play-pause" class="btn typewriter desc">Play</button>

                    <div class="control-group">
                        <span id="bpm-display" class="label-fixed typewriter desc">140 BPM</span>
                        <input type="range" id="bpm" min="60" max="180" value="140">
                    </div>

                    <div class="control-group">
                        <span class="label-fixed typewriter desc">PIANO DECAY</span>
                        <input type="range" id="piano-decay" min="0.1" max="2.0" step="0.1" value="0.5">
                    </div>

                    <div class="control-group">
                        <span class="label-fixed typewriter desc">DRUM PITCH</span>
                        <input type="range" id="drum-pitch-control" class="knob drum-pitch-slider" min="0.5" max="2.0"
                            step="0.05" value="1.0">
                    </div>
                </div>

                <div class="sequencer-wrapper">
                    <div class="instrument-labels">
                        <span class="typewriter desc">KICK</span>
                        <span class="typewriter desc">SNARE</span>
                        <span class="typewriter desc">HI-HAT</span>
                        <span class="typewriter desc">OPEN-HAT</span>
                    </div>

                    <div class="sequencer-relative-container">
                        <div id="sequencer" class="sequencer-grid"></div>
                        <div id="drum-playhead" class="playhead-drum"></div>
                    </div>

                    <div class="effects-panel">
                        <div class="knob-group">
                            <label class="label-fixed-knob typewriter desc">TONE 1</label>
                            <input type="range" class="knob drum-pitch-slider" data-row="0" min="40" max="5000"
                                value="3000">
                        </div>
                        <div class="knob-group">
                            <label class="label-fixed-knob typewriter desc">TONE 2</label>
                            <input type="range" class="knob drum-pitch-slider" data-row="1" min="200" max="8000"
                                value="4000">
                        </div>
                        <div class="knob-group">
                            <label class="label-fixed-knob typewriter desc">TONE 3</label>
                            <input type="range" class="knob drum-pitch-slider" data-row="2" min="1000" max="15000"
                                value="10000">
                        </div>
                    </div>
                </div>

                <div class="piano-roll-container">
                    <div class="piano-roll-header">
                        <h3 class="typewriter desc">PIANO ROLL</h3>
                    </div>
                    <div class="piano-roll-wrapper">
                        <div class="piano-keys-sidebar">
                            <div class="key white"><span class="typewriter desc">C4</span></div>
                            <div class="key black"></div>
                            <div class="key white"><span class="typewriter desc">B3</span></div>
                            <div class="key black"></div>
                            <div class="key white"><span class="typewriter desc">A3</span></div>
                            <div class="key black"></div>
                            <div class="key white"><span class="typewriter desc">G3</span></div>
                            <div class="key black"></div>
                            <div class="key white"><span class="typewriter desc">F3</span></div>
                            <div class="key white"><span class="typewriter desc">E3</span></div>
                            <div class="key black"></div>
                            <div class="key white"><span class="typewriter desc">D3</span></div>
                            <div class="key black"></div>
                            <div class="key white"><span class="typewriter desc">C3</span></div>
                        </div>
                        <div id="piano-sequencer">
                            <div id="playhead" class="playhead"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/ezdaw.js" defer></script>
    <script src="../js/main.js" defer></script>
</body>

</html>
